<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scarfall 2.0 Tournaments</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d0f17; 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(13, 15, 23, 0.88); 
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #ffaa00; 
        }

        header h1 {
            margin: 0;
            color: #ffaa00;
            text-transform: uppercase;
            font-size: 24px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
        }

        .tournament-list {
            margin-top: 25px;
        }

        .card {
            background: rgba(23, 27, 38, 0.95);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #ffaa00;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .badge-container {
            float: right;
            display: flex;
            gap: 5px;
        }

        .stage-badge {
            background: #ffaa00;
            color: #0d0f17;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .group-badge {
            background: #00ffcc;
            color: #0d0f17;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .card h3 {
            margin: 0 0 12px 0;
            color: #00ffcc;
            font-size: 18px;
            max-width: 65%;
            word-wrap: break-word;
        }

        .card p {
            margin: 6px 0;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.03);
            padding-bottom: 4px;
        }

        .label {
            color: #8a92a6;
        }

        .value-highlight {
            color: #ffaa00;
            font-weight: bold;
        }

        .match-schedule-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
        }

        .match-title {
            color: #00ffcc;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            padding-bottom: 2px;
            margin-bottom: 5px;
        }

        .admin-only {
            display: none; 
        }

        .admin-panel {
            background: #121620;
            border: 1px dashed #ffaa00;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #8a92a6;
        }

        .match-input-row {
            background: rgba(255, 255, 255, 0.02);
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .match-input-row label {
            color: #00ffcc;
            font-weight: bold;
        }

        .row {
            display: flex;
            gap: 10px;
        }
        .row .form-group {
            flex: 1;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #232936;
            background: #0d0f17;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        button {
            background: #ffaa00;
            color: #0d0f17;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            border: none;
        }

        button:active {
            background: #cc8800;
        }

        .delete-btn {
            background: #1d2230;
            color: #ff4655;
            padding: 6px 12px;
            font-size: 13px;
            width: auto;
            margin-top: 10px;
            float: right;
            border: 1px solid #ff4655;
        }

        .bg-btn {
            background: #232936;
            color: #fff;
            margin-top: 5px;
            font-size: 14px;
            text-transform: none;
        }

        .login-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }
        
        .admin-login-btn {
            background: transparent;
            color: #4a526b; 
            border: 1px solid #232936;
            font-size: 13px;
            padding: 8px 15px;
            width: auto;
            display: inline-block;
            text-transform: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: #121620;
            border: 1px solid #ffaa00;
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>🔥 Scarfall 2.0 🔥</h1>
            <p style="color: #8a92a6; font-size: 14px; margin: 5px 0 0 0;">Official Tournament Schedule</p>
        </header>

        <div class="tournament-list" id="tournamentContainer">
            <p style="text-align:center; color:#8a92a6; font-size:14px;">Loading live data from server...</p>
        </div>

        <div class="admin-only" id="adminSection">
            <div class="admin-panel">
                <h3 style="color: #ffaa00; margin-top: 0; border-bottom: 1px dashed #232936; padding-bottom: 5px;">⚙️ Scarfall Admin Panel</h3>
                
                <div class="form-group" style="background: #1c2130; padding: 12px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #ffaa00;">
                    <label style="color: #ffaa00; font-weight: bold;">🔐 Change Admin Email & Password:</label>
                    <input type="text" id="newEmail" placeholder="New Email ya Username" style="margin-top:5px; margin-bottom:5px;">
                    <input type="password" id="newPass" placeholder="New Password" style="margin-bottom:8px;">
                    <button style="background:#00ffcc; color:#0d0f17; font-size:14px; padding:8px;" onclick="updateAdminCredentials()">Save New Login Info</button>
                </div>

                <div class="form-group" style="background: #171b26; padding: 12px; border-radius: 5px; margin-bottom: 15px;">
                    <label style="color: #00ffcc; font-weight: bold;">🖼️ Change Background from Mobile Gallery:</label>
                    <input type="file" id="bgFile" accept="image/*" style="padding:5px;">
                    <button class="bg-btn" style="background:#ff4655; color:white; margin-top:8px;" onclick="resetBackground()">Reset to Default Theme</button>
                </div>

                <div class="form-group">
                    <label>Tournament Stage:</label>
                    <select id="tourStage">
                        <option value="Qualifiers">Qualifiers</option>
                        <option value="Semi-Finals">Semi-Finals</option>
                        <option value="Grand Final">Grand Final / Final</option>
                        <option value="Daily Scrims">Daily Scrims</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Select Group:</label>
                    <select id="groupName">
                        <option value="">No Group</option>
                        <option value="Group A">Group A</option>
                        <option value="Group B">Group B</option>
                        <option value="Group C">Group C</option>
                        <option value="Group D">Group D</option>
                        <option value="All Groups">All Groups</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Select Map:</label>
                    <select id="mapName">
                        <option value="Kirok">Kirok</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Kirok + Mumbai">Kirok + Mumbai</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Tournament Name / Title:</label>
                    <input type="text" id="tourName" placeholder="e.g., Underdog Cup Season 1">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>📅 Match Date (Calendar):</label>
                        <input type="date" id="tourDate">
                    </div>
                    <div class="form-group">
                        <label>⏱️ Timeline Label:</label>
                        <select id="tourDayLabel">
                            <option value="">None</option>
                            <option value="Day 1">Day 1</option>
                            <option value="Day 2">Day 2</option>
                            <option value="Day 3">Day 3</option>
                            <option value="Day 4">Day 4</option>
                            <option value="Grand Finale">Grand Finale</option>
                        </select>
                    </div>
                </div>

                <h4 style="color:#ffaa00; margin: 15px 0 5px 0; border-bottom: 1px solid #232936; padding-bottom:5px;">🕒 Set Match Wise Timings:</h4>
                
                <div class="match-input-row"><label>Match 1</label><div class="row"><div class="form-group"><input type="time" id="m1_idp"></div><div class="form-group"><input type="time" id="m1_start"></div></div></div>
                <div class="match-input-row"><label>Match 2</label><div class="row"><div class="form-group"><input type="time" id="m2_idp"></div><div class="form-group"><input type="time" id="m2_start"></div></div></div>
                <div class="match-input-row"><label>Match 3</label><div class="row"><div class="form-group"><input type="time" id="m3_idp"></div><div class="form-group"><input type="time" id="m3_start"></div></div></div>
                <div class="match-input-row"><label>Match 4</label><div class="row"><div class="form-group"><input type="time" id="m4_idp"></div><div class="form-group"><input type="time" id="m4_start"></div></div></div>
                <div class="match-input-row"><label>Match 5</label><div class="row"><div class="form-group"><input type="time" id="m5_idp"></div><div class="form-group"><input type="time" id="m5_start"></div></div></div>

                <button onclick="addTournament()">Publish Tournament Schedule</button>
            </div>
        </div>

        <div class="login-section">
            <button class="admin-login-btn" id="loginBtn" onclick="openLoginModal()">Admin Login</button>
            <button class="admin-login-btn" id="logoutBtn" onclick="logout()" style="display:none; color:#ff4655; border-color:#ff4655;">Logout</button>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3 style="color:#ffaa00; margin-top:0;">🔐 Admin Authentication</h3>
            <div class="form-group">
                <label>Email ID / Username:</label>
                <input type="text" id="loginEmail" placeholder="admin">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="loginPassword" placeholder="1234">
            </div>
            <button onclick="authenticateAdmin()" style="margin-bottom:10px;">Login</button>
            <button onclick="forgotPasswordReset()" style="background:#ff4655; color:#fff; margin-bottom:10px; font-size:14px; padding:8px;">⚠️ Forgot / Reset Password</button>
            <button onclick="closeLoginModal()" style="background:#232936; color:#fff;">Cancel</button>
        </div>
    </div>

    <script>
        // Global Free Firebase Database Config Secured 
        const firebaseConfig = {
            databaseURL: "https://scarfall-tournament-live-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isAdmin = false;

        if(!localStorage.getItem("scarfall_admin_email")) { localStorage.setItem("scarfall_admin_email", "admin"); }
        if(!localStorage.getItem("scarfall_admin_pass")) { localStorage.setItem("scarfall_admin_pass", "1234"); }

        document.addEventListener("DOMContentLoaded", () => {
            loadBackground(); 
            listenToLiveTournaments(); // Sync real-time entries directly with database global server

            document.getElementById('bgFile').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const base64Image = event.target.result;
                        document.body.style.backgroundImage = `url('${base64Image}')`;
                        localStorage.setItem("scarfall_gallery_bg", base64Image);
                        alert("Background photo updated successfully!");
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        function resetBackground() {
            document.body.style.backgroundImage = "none";
            document.body.style.backgroundColor = "#0d0f17";
            localStorage.removeItem("scarfall_gallery_bg");
            document.getElementById("bgFile").value = "";
            alert("Default dark theme restored.");
        }

        function loadBackground() {
            const savedBg = localStorage.getItem("scarfall_gallery_bg");
            if(savedBg) { document.body.style.backgroundImage = `url('${savedBg}')`; }
        }

        function openLoginModal() { document.getElementById("loginModal").style.display = "flex"; }
        function closeLoginModal() {
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("loginEmail").value = "";
            document.getElementById("loginPassword").value = "";
        }

        function authenticateAdmin() {
            const emailInput = document.getElementById("loginEmail").value.trim();
            const passInput = document.getElementById("loginPassword").value;
            const savedEmail = localStorage.getItem("scarfall_admin_email");
            const savedPass = localStorage.getItem("scarfall_admin_pass");

            if (emailInput === savedEmail && passInput === savedPass) {
                isAdmin = true;
                document.getElementById("adminSection").style.display = "block";
                document.getElementById("logoutBtn").style.display = "inline-block";
                document.getElementById("loginBtn").style.display = "none"; 
                closeLoginModal();
                alert("Access Granted. Welcome Owner!");
                listenToLiveTournaments();
            } else {
                alert("Galat Details! Login nahi ho saka.");
            }
        }

        function forgotPasswordReset() {
            const confirmReset = confirm("Kya aap login details ko badal kar Email: 'admin' aur Password: '1234' par reset karna chahte hain?");
            if(confirmReset) {
                localStorage.setItem("scarfall_admin_email", "admin");
                localStorage.setItem("scarfall_admin_pass", "1234");
                document.getElementById("loginEmail").value = "admin";
                document.getElementById("loginPassword").value = "1234";
                alert("Success! Ab aap Username: 'admin' aur Password: '1234' daal kar Login button dabayein.");
            }
        }

        function updateAdminCredentials() {
            const newEmail = document.getElementById("newEmail").value.trim();
            const newPass = document.getElementById("newPass").value;
            if(!newEmail || !newPass) { alert("Naya Email aur Password dono bharna zaroori hai!"); return; }
            localStorage.setItem("scarfall_admin_email", newEmail);
            localStorage.setItem("scarfall_admin_pass", newPass);
            document.getElementById("newEmail").value = "";
            document.getElementById("newPass").value = "";
            alert(`Saved successfully!\nAb aapka Naya Username: ${newEmail} hai.`);
        }

        function logout() {
            isAdmin = false;
            document.getElementById("adminSection").style.display = "none";
            document.getElementById("logoutBtn").style.display = "none";
            document.getElementById("loginBtn").style.display = "inline-block"; 
            listenToLiveTournaments();
        }

        function addTournament() {
            const stage = document.getElementById("tourStage").value;
            const group = document.getElementById("groupName").value; 
            const map = document.getElementById("mapName").value;
            const name = document.getElementById("tourName").value;
            const rawDate = document.getElementById("tourDate").value;
            const dayLabel = document.getElementById("tourDayLabel").value;

            if(!name || !rawDate) { alert("Tournament Name aur Match Date select karna zaroori hai!"); return; }

            const dateParts = rawDate.split("-");
            const formattedDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;
            const finalDateString = dayLabel ? `${formattedDate} (${dayLabel})` : formattedDate;

            let matchTimings = [];
            for(let i=1; i<=5; i++) {
                let idpVal = document.getElementById(`m${i}_idp`).value;
                let startVal = document.getElementById(`m${i}_start`).value;
                if(idpVal || startVal) {
                    matchTimings.push({
                        matchLabel: `Match ${i}`,
                        idpTime: idpVal ? tConvert(idpVal) : "TBD",
                        startTime: startVal ? tConvert(startVal) : "TBD"
                    });
                }
            }

            if(matchTimings.length === 0) { alert("Kam se kam kisi EK match ka time daalna zaroori hai!"); return; }

            const tourId = Date.now().toString();
            const tournamentData = {
                id: tourId,
                game: "Scarfall 2.0",
                stage: stage,
                group: group, 
                map: map,
                name: name,
                date: finalDateString, 
                matches: matchTimings
            };

            // Write Directly to Free Server cloud database database
            database.ref('tournaments/' + tourId).set(tournamentData, (error) => {
                if(error) {
                    alert("Server Error! Update save nahi ho saka.");
                } else {
                    document.getElementById("tourName").value = "";
                    document.getElementById("tourDate").value = "";
                    document.getElementById("tourDayLabel").value = "";
                    for(let i=1; i<=5; i++) {
                        document.getElementById(`m${i}_idp`).value = "";
                        document.getElementById(`m${i}_start`).value = "";
                    }
                    alert("Tournament schedule successfully published to server!");
                }
            });
        }

        // Live Event Listeners mapping global data synchronized instantly across all screens
        function listenToLiveTournaments() {
            database.ref('tournaments').on('value', (snapshot) => {
                const container = document.getElementById("tournamentContainer");
                container.innerHTML = "";
                
                const data = snapshot.val();
                if(!data) {
                    container.innerHTML = `<p style="text-align:center; color:#8a92a6; font-size:14px;">No upcoming tournaments active.</p>`;
                    return;
                }

                Object.keys(data).forEach(key => {
                    const tour = data[key];
                    const card = document.createElement("div");
                    card.className = "card";
                    
                    let deleteButtonHTML = isAdmin ? `<button class="delete-btn" onclick="deleteTournament('${tour.id}')">Delete Tournament</button>` : '';
                    let groupBadgeHTML = tour.group ? `<span class="group-badge">${tour.group}</span>` : '';

                    let matchesHTML = '';
                    if(tour.matches) {
                        tour.matches.forEach(m => {
                            matchesHTML += `
                                <div class="match-schedule-box">
                                    <div class="match-title">🎮 ${m.matchLabel}</div>
                                    <p style="border:none; margin:2px 0;"><span class="label">🔑 IDP:</span> <span style="color:#ffaa00; font-weight:bold;">${m.idpTime}</span></p>
                                    <p style="border:none; margin:2px 0;"><span class="label">🚀 Start:</span> <span style="color:#00ffcc; font-weight:bold;">${m.startTime}</span></p>
                                </div>
                            `;
                        });
                    }

                    card.innerHTML = `
                        <div class="badge-container">
                            ${groupBadgeHTML}
                            <span class="stage-badge">${tour.stage}</span>
                        </div>
                        <h3>${tour.game} - ${tour.name}</h3>
                        <p><span class="label">🗺️ Map Pool:</span> <span class="value-highlight">${tour.map}</span></p>
                        <p><span class="label">📅 Date/Timeline:</span> <span>${tour.date}</span></p>
                        
                        <div style="margin-top:12px;">
                           ${matchesHTML}
                        </div>
                        
                        ${deleteButtonHTML}
                        <div style="clear:both;"></div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function deleteTournament(id) {
            if(confirm("Kya aap is tournament ko server se hamesha ke liye delete karna chahte hain?")) {
                database.ref('tournaments/' + id).remove();
            }
        }

        function tConvert(time) {
            time = time.toString().match(/^([01]\d|2[0-3])(:)([0-5]\d)(:[0-5]\d)?$/) || [time];
            if (time.length > 1) { 
                time = time.slice(1); 
                time[5] = +time[0] < 12 ? ' AM' : ' PM'; 
                time[0] = +time[0] % 12 || 12; 
            }
            return time.join(''); 
        }
    </script>
</body>
</html>
